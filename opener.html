<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for WebRTC connections -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        .display-mode body { display: none !important; }
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
        .tab-inactive { color: #52525b; border-bottom: 2px solid transparent; }
    </style>

    <script>
        /**
         * UNIVERSAL ROUTER
         */
        (function() {
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;
            const fileId = (hash && hash.startsWith('#file_')) ? hash.substring(1) : params.get('fileId');
            
            if (fileId) {
                const code = localStorage.getItem(fileId);
                if (code) {
                    document.documentElement.classList.add('display-mode');
                    document.open();
                    document.write(code);
                    document.close();
                }
            }
        })();
    </script>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-xl w-full bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl overflow-hidden">
        
        <!-- Header & Tabs -->
        <div class="px-6 pt-6 pb-0 border-b border-zinc-800">
            <h1 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M12 5v14M5 12h14"/></svg>
                Doc Share
            </h1>
            <div class="flex gap-6">
                <button id="tab-send" onclick="switchTab('send')" class="pb-3 px-1 font-medium transition-colors tab-active">Host</button>
                <button id="tab-receive" onclick="switchTab('receive')" class="pb-3 px-1 font-medium transition-colors tab-inactive">Receive</button>
            </div>
        </div>

        <!-- HOST VIEW -->
        <div id="view-send" class="p-6 block">
            <textarea id="host-document" class="w-full h-48 bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-zinc-300 font-mono text-sm focus:outline-none focus:border-emerald-500 mb-4 resize-none" placeholder="Enter content..."></textarea>
            
            <div class="flex items-center gap-4">
                <button id="btn-host" onclick="startHosting()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-medium transition-colors">Start</button>
                <div id="host-status" class="text-sm font-medium text-zinc-500">Ready</div>
            </div>

            <div id="host-code-container" class="mt-6 hidden bg-zinc-950 border border-emerald-900/50 rounded-lg p-4 text-center">
                <p class="text-xs text-zinc-500 uppercase tracking-widest mb-1">Code</p>
                <div id="host-code" class="text-4xl font-bold text-emerald-400 tracking-[0.2em]">------</div>
            </div>
        </div>

        <!-- RECEIVE VIEW -->
        <div id="view-receive" class="p-6 hidden">
            <div class="flex gap-3 mb-6">
                <input type="text" id="receive-code" maxlength="6" class="w-1/3 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-center text-xl text-white font-mono focus:outline-none focus:border-emerald-500" placeholder="000000">
                <button id="btn-connect" onclick="connectToHost()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-lg font-medium transition-colors border border-zinc-700">Connect</button>
            </div>

            <div id="receive-status" class="text-sm font-medium text-zinc-500 mb-4 hidden">Connecting...</div>

            <textarea id="received-document" class="w-full h-40 bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-zinc-400 font-mono text-sm mb-4 resize-none opacity-50 cursor-not-allowed" readonly></textarea>
        </div>
    </div>

    <script>
        const PREFIX = 'simplistic-doc-share-';
        let peer = null;
        let connection = null;

        function switchTab(tab) {
            document.getElementById('view-send').style.display = tab === 'send' ? 'block' : 'none';
            document.getElementById('view-receive').style.display = tab === 'receive' ? 'block' : 'none';
            document.getElementById('tab-send').className = tab === 'send' ? 'pb-3 px-1 font-medium transition-colors tab-active' : 'pb-3 px-1 font-medium transition-colors tab-inactive';
            document.getElementById('tab-receive').className = tab === 'receive' ? 'pb-3 px-1 font-medium transition-colors tab-active' : 'pb-3 px-1 font-medium transition-colors tab-inactive';
            if (peer) { peer.destroy(); peer = null; }
            resetUI();
        }

        function resetUI() {
            document.getElementById('host-code-container').classList.add('hidden');
            document.getElementById('host-status').innerText = 'Ready';
            document.getElementById('btn-host').innerText = 'Start';
            document.getElementById('btn-host').disabled = false;
            document.getElementById('receive-status').classList.add('hidden');
            document.getElementById('received-document').value = '';
            document.getElementById('received-document').classList.add('opacity-50', 'cursor-not-allowed');
        }

        function startHosting() {
            const docContent = document.getElementById('host-document').value;
            if (!docContent.trim()) return;
            document.getElementById('btn-host').disabled = true;
            const sixDigitCode = Math.floor(100000 + Math.random() * 900000).toString();
            peer = new Peer(PREFIX + sixDigitCode);
            peer.on('open', () => {
                document.getElementById('host-code-container').classList.remove('hidden');
                document.getElementById('host-code').innerText = sixDigitCode;
                document.getElementById('host-status').innerHTML = '<span class="text-emerald-400">Active</span>';
            });
            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    conn.send(document.getElementById('host-document').value);
                    document.getElementById('host-status').innerHTML = '<span class="text-emerald-400">Sent</span>';
                });
            });
        }

        function connectToHost() {
            const code = document.getElementById('receive-code').value.trim();
            if (code.length !== 6) return;
            const statusEl = document.getElementById('receive-status');
            statusEl.classList.remove('hidden');
            statusEl.innerText = 'Connecting...';
            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect(PREFIX + code);
                connection.on('data', (data) => {
                    const textDoc = document.getElementById('received-document');
                    textDoc.value = data;
                    textDoc.classList.remove('opacity-50', 'cursor-not-allowed');
                    textDoc.classList.add('text-zinc-100');
                    
                    // Copy to clipboard
                    copyToClipboard(data);
                    
                    statusEl.innerHTML = '<span class="text-emerald-400">Received & Copied to Clipboard!</span>';
                });
            });
        }

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
