<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Control Panel - Checkers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a;
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(45, 212, 191, 0.15);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }
        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(45, 212, 191, 0.3);
            color: #5eead4;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            outline: none;
        }
        .btn-primary {
            background: rgba(20, 184, 166, 0.1);
            color: #5eead4;
            border: 1px solid rgba(20, 184, 166, 0.4);
            border-radius: 0.5rem;
            padding: 0.75rem 1.5rem;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background: rgba(20, 184, 166, 0.25);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 bg-[#0f172a] text-[#f8fafc]" id="admin-body">
    <div id="admin-content" class="hidden">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-teal-400 tracking-wider">EMAIL CONTROL PANEL</h1>
                <button onclick="window.location.href='index.html'" class="btn-primary">Back to Game</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Send Message Section -->
                <div class="glass-panel p-6 rounded-2xl">
                    <h2 class="text-xl text-teal-300 mb-4 font-semibold border-b border-teal-500/20 pb-2">Send Response</h2>
                    <div class="flex flex-col gap-4">
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Recipient (Friend Code or Email)</label>
                            <input type="text" id="recipient-id" class="glass-input w-full" placeholder="8-DIGIT CODE or user@example.com">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Subject</label>
                            <input type="text" id="msg-subject" class="glass-input w-full" placeholder="Subject line">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Message Content</label>
                            <textarea id="msg-content" class="glass-input w-full h-32 resize-none" placeholder="Write your message here..."></textarea>
                        </div>
                        <button id="send-btn" class="btn-primary w-full font-bold">SEND EMAIL</button>
                    </div>
                </div>

                <!-- Sent Messages Section -->
                <div class="glass-panel p-6 rounded-2xl flex flex-col">
                    <h2 class="text-xl text-teal-300 mb-4 font-semibold border-b border-teal-500/20 pb-2">Sent Emails</h2>
                    <div id="sent-list" class="flex-1 overflow-y-auto max-h-[500px] space-y-4 pr-2">
                        <p class="text-slate-500 italic text-center py-8">Loading sent messages...</p>
                    </div>
                </div>
            </div>

            <!-- Player Management Section -->
            <div class="glass-panel p-6 rounded-2xl mt-8">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 border-b border-teal-500/20 pb-2">
                    <h2 class="text-xl text-teal-300 font-semibold">Player Management</h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <input type="text" id="player-search" class="glass-input text-xs py-2 flex-1 sm:w-64" placeholder="Search by name or code...">
                        <button id="refresh-players-btn" class="btn-primary text-xs py-2 px-4">Refresh</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-700/50">
                                <th class="pb-2 font-medium">Player</th>
                                <th class="pb-2 font-medium">Friend Code</th>
                                <th class="pb-2 font-medium">Points</th>
                                <th class="pb-2 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="player-list" class="divide-y divide-slate-700/30">
                            <tr>
                                <td colspan="4" class="py-8 text-center text-slate-500 italic">Loading players...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-loading" class="fixed inset-0 flex items-center justify-center bg-[#0f172a] z-[100]">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-teal-400 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-teal-400 font-medium tracking-widest uppercase animate-pulse">Authenticating Admin...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, getDoc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbGNT4rnLQFB_6G6HW5VNpnDB6Y5WexiE",
            authDomain: "auth.checkers.page",
            projectId: "checkers-matchmaking-5ac55",
            storageBucket: "checkers-matchmaking-5ac55.firebasestorage.app",
            messagingSenderId: "778086491027",
            appId: "1:778086491027:web:c315fd9d97aebae6087e66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'checkers-app';

        let currentUser = null;
        let allPlayers = [];

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== 'email-control-panel@checkers.page') {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            document.getElementById('auth-loading').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            loadSentMessages();
            setupSendButton();
            loadPlayers();
            
            // Auto-refresh sent messages every 5 seconds
            setInterval(() => {
                if (currentUser) {
                    loadSentMessages();
                }
            }, 5000);
        });

        document.getElementById('refresh-players-btn').onclick = () => loadPlayers();
        document.getElementById('player-search').oninput = (e) => renderPlayers(e.target.value);

        async function loadPlayers() {
            const listEl = document.getElementById('player-list');
            try {
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const snap = await getDocs(q);
                allPlayers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
                renderPlayers();
            } catch (e) {
                console.error(e);
                listEl.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-red-400">Error loading players: ${e.message}</td></tr>`;
            }
        }

        function renderPlayers(search = '') {
            const listEl = document.getElementById('player-list');
            const filtered = allPlayers.filter(p => {
                if (p.hiddenFromLeaderboard) return false;
                const s = search.toLowerCase();
                return (p.displayName || '').toLowerCase().includes(s) || 
                       (p.friendCode || '').toLowerCase().includes(s);
            });

            if (filtered.length === 0) {
                listEl.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-slate-500 italic">No players found.</td></tr>`;
                return;
            }

            listEl.innerHTML = '';
            filtered.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-700/30 hover:bg-slate-800/30 transition-colors';
                tr.innerHTML = `
                    <td class="py-3">
                        <div class="flex flex-col">
                            <span class="font-bold text-teal-100">${p.displayName || 'Anonymous'}</span>
                            <span class="text-[10px] text-slate-500 uppercase tracking-tighter">${p.uid.substring(0, 8)}...</span>
                        </div>
                    </td>
                    <td class="py-3 font-mono text-teal-400/80">${p.friendCode || '---'}</td>
                    <td class="py-3 text-slate-300 font-medium">${p.playerPoints || 5}</td>
                    <td class="py-3 text-right">
                        <button onclick="window.deletePlayer('${p.uid}', '${p.displayName || 'this player'}')" 
                                class="text-xs bg-red-500/10 text-red-400 border border-red-500/30 px-3 py-1 rounded-lg hover:bg-red-500/20 transition-all">
                            Delete
                        </button>
                    </td>
                `;
                listEl.appendChild(tr);
            });
        }

        window.deletePlayer = async (uid, name) => {
            if (!confirm(`Are you sure you want to delete ${name}? They will be hidden from leaderboards until they reconnect.`)) return;
            
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', uid);
                await updateDoc(docRef, { hiddenFromLeaderboard: true });
                alert(`${name} has been hidden from leaderboards.`);
                loadPlayers();
            } catch (e) {
                console.error(e);
                alert("Failed to delete player: " + e.message);
            }
        };

        let isHistoryLoading = false;
        async function loadSentMessages() {
            if (isHistoryLoading) return;
            isHistoryLoading = true;
            const sentList = document.getElementById('sent-list');
            try {
                const q = collection(db, 'artifacts', appId, 'admin', 'sentMessages', 'history');
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    sentList.innerHTML = '<p class="text-slate-500 italic text-center py-8">No messages sent yet.</p>';
                    return;
                }

                // Sort client-side: newest first
                const docs = querySnapshot.docs.sort((a, b) => (b.data().timestamp || 0) - (a.data().timestamp || 0));

                sentList.innerHTML = '';
                docs.forEach((doc) => {
                    const data = doc.data();
                    const date = new Date(data.timestamp).toLocaleString();
                    const div = document.createElement('div');
                    div.className = 'bg-slate-800/50 p-4 rounded-xl border border-teal-500/10';
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-teal-400 font-bold text-sm">${data.toCode}</span>
                            <span class="text-[10px] text-slate-500">${date}</span>
                        </div>
                        <div class="text-slate-200 font-medium text-sm mb-1">${data.subject}</div>
                        <div class="text-slate-400 text-xs line-clamp-2">${data.content}</div>
                    `;
                    sentList.appendChild(div);
                });
            } catch (e) {
                console.error(e);
                sentList.innerHTML = '<p class="text-red-400 text-center py-8">Error loading messages.</p>';
            } finally {
                isHistoryLoading = false;
            }
        }

        function setupSendButton() {
            const sendBtn = document.getElementById('send-btn');
            if (!sendBtn) return;
            
            sendBtn.onclick = async () => {
                const recipientInput = document.getElementById('recipient-id').value.trim();
                const subject = document.getElementById('msg-subject').value.trim();
                const content = document.getElementById('msg-content').value.trim();

                if (!recipientInput || !subject || !content) {
                    alert("Please fill in all fields.");
                    return;
                }

                try {
                    let recipientUid = null;
                    let toLabel = recipientInput;

                    if (recipientInput.includes('@')) {
                        // Look up by email
                        const emailRef = doc(db, 'artifacts', appId, 'public', 'data', 'emails', recipientInput.toLowerCase());
                        const emailSnap = await getDoc(emailRef);
                        if (emailSnap.exists()) {
                            recipientUid = emailSnap.data().uid;
                        } else {
                            alert("User with this email not found.");
                            return;
                        }
                    } else {
                        // Look up by friend code
                        const codeRef = doc(db, 'artifacts', appId, 'public', 'data', 'friendCodes', recipientInput);
                        const codeSnap = await getDoc(codeRef);
                        if (codeSnap.exists()) {
                            recipientUid = codeSnap.data().uid;
                        } else {
                            alert("Friend code not found.");
                            return;
                        }
                    }

                    // 2. Send message to user's inbox
                    const userMsgRef = collection(db, 'artifacts', appId, 'users', recipientUid, 'messages');
                    await addDoc(userMsgRef, {
                        subject,
                        body: content, // Changed content to body to match index.html
                        timestamp: Date.now(),
                        from: 'Admin',
                        read: false
                    });

                    // 3. Record in admin history
                    const adminHistoryRef = collection(db, 'artifacts', appId, 'admin', 'sentMessages', 'history');
                    await addDoc(adminHistoryRef, {
                        toUid: recipientUid,
                        toCode: toLabel,
                        subject,
                        content,
                        timestamp: Date.now()
                    });

                    alert("Message sent successfully!");
                    document.getElementById('recipient-id').value = '';
                    document.getElementById('msg-subject').value = '';
                    document.getElementById('msg-content').value = '';
                    loadSentMessages();
                } catch (e) {
                    console.error(e);
                    alert("Failed to send message: " + e.message);
                }
            };
        }
    </script>
</body>
</html>
