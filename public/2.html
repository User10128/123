<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Shape Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1ADBDB; /* Base fallback */
            cursor: none; /* Hide default cursor to use custom inverted one */
            font-family: sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* The custom cursor that inverts colors underneath it */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 36px;
            height: 36px;
            background-color: white; /* White with difference blend mode creates a perfect color inversion */
            border-radius: 50%;
            pointer-events: none; /* Let clicks pass through to canvas */
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.1s ease, height 0.1s ease;
        }

        /* Inner dot for precision */
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Expand cursor on click */
        body.active #custom-cursor {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');

        // Adjusted palette to use the two custom colors
        const PALETTE = {
            color1: '#DB1A1A', // Bright Red
            color2: '#1ADBDB'  // Bright Cyan
        };

        let width, height;
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let startTime = Date.now();

        // Handle resizing and grid regeneration
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            startTime = Date.now(); // Reset start time on resize to trigger a new intro effect

            const spacing = 45; // Space between shapes

            for (let x = spacing / 2; x < width; x += spacing) {
                for (let y = spacing / 2; y < height; y += spacing) {
                    particles.push(new Particle(x, y));
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                
                // START RANDOMIZED: Instead of spawning on the grid,
                // spawn at a random spot off or on the screen to fly in!
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // Give them a starting velocity burst
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                
                // Set contrasting color based on the two background halves
                let halfHeight = height / 2;
                if (y < halfHeight) {
                    this.color = PALETTE.color2; // Cyan shapes on Red background
                } else {
                    this.color = PALETTE.color1; // Red shapes on Cyan background
                }
                
                this.baseRadius = 6 + Math.random() * 4;
                this.radius = this.baseRadius * 0.1; // Start tiny and scale up
                this.targetRadius = this.baseRadius;
                
                this.cornerRatio = 1;
                this.targetCornerRatio = 1;
                this.angle = Math.random() * Math.PI * 2;
                this.timeOffset = Math.random() * Math.PI * 2;
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                // Subtle continuous organic wave motion (even when idle)
                const waveSpeed = Date.now() * 0.0015;
                const waveScale = 0.008;
                let idleOffsetX = Math.sin(this.baseY * waveScale + waveSpeed + this.timeOffset) * 6;
                let idleOffsetY = Math.cos(this.baseX * waveScale + waveSpeed + this.timeOffset) * 6;

                // Combine baseline grid spot with idle wave animation
                let targetX = this.baseX + idleOffsetX;
                let targetY = this.baseY + idleOffsetY;

                // Handle interactive cursor physics
                let isNearMouse = false;
                if (dist < 150) {
                    isNearMouse = true;
                    let force = (150 - dist) / 150;
                    this.vx -= (dx / dist) * force * 1.8;
                    this.vy -= (dy / dist) * force * 1.8;
                    
                    this.targetRadius = this.baseRadius * 2.5;
                    this.targetCornerRatio = 0.35; // Morph to rounded square
                } else {
                    this.targetRadius = this.baseRadius;
                    this.targetCornerRatio = 1; // Return to circle
                }

                // Intro expanding shockwave effect (pulses from center of screen on load)
                const elapsed = Date.now() - startTime;
                if (elapsed < 2500) {
                    const centerX = width / 2;
                    const centerY = height / 2;
                    let distToCenter = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);
                    
                    // The wave front moves outwards over time
                    const waveRadius = (elapsed / 2500) * (Math.max(width, height) * 1.2);
                    const waveThickness = 120;

                    if (Math.abs(distToCenter - waveRadius) < waveThickness) {
                        const waveForce = (1 - Math.abs(distToCenter - waveRadius) / waveThickness);
                        const angleToCenter = Math.atan2(this.y - centerY, this.x - centerX);
                        
                        // Push away from center
                        this.vx += Math.cos(angleToCenter) * waveForce * 4;
                        this.vy += Math.sin(angleToCenter) * waveForce * 4;
                        
                        // Morph while the intro wave hits them
                        this.targetCornerRatio = 0.35;
                        this.targetRadius = this.baseRadius * 2.0;
                    }
                }

                // Return to target position (spring effect)
                let bx = targetX - this.x;
                let by = targetY - this.y;
                
                this.vx += bx * 0.04; // Spring force
                this.vy += by * 0.04;
                
                this.vx *= 0.82; // Friction/damping
                this.vy *= 0.82;

                this.x += this.vx;
                this.y += this.vy;

                // Smoothly transition size and shape corner-ratio
                this.radius += (this.targetRadius - this.radius) * 0.15;
                this.cornerRatio += (this.targetCornerRatio - this.cornerRatio) * 0.15;
                
                // Dynamic rotation based on movement velocity
                this.angle += (Math.abs(this.vx) + Math.abs(this.vy)) * 0.03 + 0.005;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Morph smoothly between a circle (ratio 1) and a rounded square (ratio 0.35) using roundRect
                ctx.roundRect(-this.radius, -this.radius, this.radius * 2, this.radius * 2, this.radius * this.cornerRatio);

                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // Animation Loop
        function animate() {
            // Draw the two background halves
            ctx.fillStyle = PALETTE.color1;
            ctx.fillRect(0, 0, width, height / 2);
            
            ctx.fillStyle = PALETTE.color2;
            ctx.fillRect(0, height / 2, width, height / 2);

            // Update and draw all particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', init);

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Move the custom cursor
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Touch support for mobile devices
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            cursor.style.left = mouse.x + 'px';
            cursor.style.top = mouse.y + 'px';
        });

        // Click blast effect
        window.addEventListener('mousedown', () => {
            document.body.classList.add('active');
            particles.forEach(p => {
                let dx = p.x - mouse.x;
                let dy = p.y - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    p.vx += (dx / dist) * 25;
                    p.vy += (dy / dist) * 25;
                }
            });
        });

        window.addEventListener('mouseup', () => {
            document.body.classList.remove('active');
        });

        window.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // Start
        init();
        animate();
    </script>
</body>
</html>
