<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Shape Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #5EEAD4; /* Base fallback */
            cursor: none; /* Hide default cursor to use custom inverted one */
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        /* The custom cursor that inverts colors underneath it */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 36px;
            height: 36px;
            background-color: white; /* White with difference blend mode creates a perfect color inversion */
            border-radius: 50%;
            pointer-events: none; /* Let clicks pass through to canvas */
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.1s ease, height 0.1s ease;
        }

        /* Inner dot for precision */
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Expand cursor on click */
        body.active #custom-cursor {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');

        // The specific palette provided
        const PALETTE = {
            top: '#5EEA8F',
            middle: '#5EEAD4',
            bottom: '#5EB9EA'
        };

        let width, height;
        let particles = [];
        const mouse = { x: -1000, y: -1000 };

        // Handle resizing and grid regeneration
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];

            const spacing = 45; // Space between shapes

            for (let x = spacing / 2; x < width; x += spacing) {
                for (let y = spacing / 2; y < height; y += spacing) {
                    particles.push(new Particle(x, y));
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                
                // Determine which section this particle belongs to and assign contrasting colors
                let sectionHeight = height / 3;
                let colors = [PALETTE.top, PALETTE.middle, PALETTE.bottom];
                let sectionIndex = Math.floor(y / sectionHeight);
                
                // Keep it safe within bounds
                if(sectionIndex > 2) sectionIndex = 2; 
                
                // Remove the background color of its native section so it stands out
                colors.splice(sectionIndex, 1);
                
                // Assign one of the remaining two colors randomly
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.baseRadius = 6 + Math.random() * 4;
                this.radius = this.baseRadius;
                this.targetRadius = this.baseRadius;
                
                this.cornerRatio = 1;
                this.targetCornerRatio = 1;
                this.angle = 0;
                this.timeOffset = Math.random() * Math.PI * 2;
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                // Mouse interaction physics
                if (dist < 150) {
                    let force = (150 - dist) / 150;
                    this.vx -= (dx / dist) * force * 1.5;
                    this.vy -= (dy / dist) * force * 1.5;
                    
                    this.targetRadius = this.baseRadius * 2.5;

                    // Shape morphing based on proximity
                    this.targetCornerRatio = 0.35; // Morph to very rounded square
                } else {
                    this.targetRadius = this.baseRadius;
                    this.targetCornerRatio = 1; // Morph back to circle
                }

                // Return to base position with a spring effect
                let bx = this.baseX - this.x;
                let by = this.baseY - this.y;
                
                this.vx += bx * 0.04; // Spring strength
                this.vy += by * 0.04;
                
                this.vx *= 0.82; // Friction
                this.vy *= 0.82;

                this.x += this.vx;
                this.y += this.vy;

                // Add slight continuous floating motion
                this.y += Math.sin(Date.now() * 0.002 + this.timeOffset) * 0.2;

                // Smoothly transition size and shape
                this.radius += (this.targetRadius - this.radius) * 0.15;
                this.cornerRatio += (this.targetCornerRatio - this.cornerRatio) * 0.15;
                
                // Dynamic rotation based on movement speed
                this.angle += (Math.abs(this.vx) + Math.abs(this.vy)) * 0.03;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Morph smoothly between a circle and a rounded square using roundRect
                ctx.roundRect(-this.radius, -this.radius, this.radius * 2, this.radius * 2, this.radius * this.cornerRatio);

                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // Animation Loop
        function animate() {
            // Draw the three background stripes
            ctx.fillStyle = PALETTE.top;
            ctx.fillRect(0, 0, width, height / 3);
            
            ctx.fillStyle = PALETTE.middle;
            ctx.fillRect(0, height / 3, width, height / 3);
            
            ctx.fillStyle = PALETTE.bottom;
            ctx.fillRect(0, (height / 3) * 2, width, height / 3);

            // Update and draw all particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', init);

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Move the custom cursor
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Touch support for mobile devices
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            cursor.style.left = mouse.x + 'px';
            cursor.style.top = mouse.y + 'px';
        });

        // Click blast effect
        window.addEventListener('mousedown', () => {
            document.body.classList.add('active');
            particles.forEach(p => {
                let dx = p.x - mouse.x;
                let dy = p.y - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    p.vx += (dx / dist) * 25;
                    p.vy += (dy / dist) * 25;
                }
            });
        });

        window.addEventListener('mouseup', () => {
            document.body.classList.remove('active');
        });

        window.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // Start
        init();
        animate();
    </script>
</body>
</html>
