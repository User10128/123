<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232dd4bf' stroke-width='2'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Ccircle cx='12' cy='12' r='5' fill='%232dd4bf'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #020617; /* Slate 950 */
        }

        /* Smooth movement for the cursor glow */
        #cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.2) 0%, rgba(37, 99, 235, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            /* Using transforms for smooth movement */
            will-change: transform;
        }

        /* Background floating blobs (passive) */
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .animate-float {
            animation: float 12s infinite ease-in-out;
        }

        /* Translucent Box (Glassmorphism) */
        .translucent-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative text-blue-50">

    <!-- Cursor Follower Glow -->
    <div id="cursor-glow"></div>

    <!-- Ambient Background Decorations -->
    <div class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-blue-900/10 rounded-full filter blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[600px] h-[600px] bg-indigo-900/10 rounded-full filter blur-[150px] animate-float" style="animation-delay: -6s;"></div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 w-full max-w-2xl p-6 text-center flex flex-col items-center">
        <div class="translucent-box p-12 md:p-20 rounded-[2.5rem] w-full transition-transform duration-700">
            <!-- 404 Header -->
            <h1 class="text-8xl md:text-9xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-blue-300 via-blue-500 to-indigo-500 mb-6">
                404
            </h1>
            
            <h2 class="text-2xl md:text-4xl font-semibold text-blue-100/90 mb-6">
                Lost in the deep blue.
            </h2>
            
            <p class="text-blue-300/60 mb-12 text-lg md:text-xl max-w-sm mx-auto leading-relaxed">
                This page has disappeared into the digital ocean. Let's get you back to safety.
            </p>
            
            <a href="/index.html" class="inline-flex items-center justify-center px-12 py-5 text-lg font-bold text-white transition-all duration-300 rounded-2xl bg-blue-600 hover:bg-blue-500 shadow-xl shadow-blue-900/30 hover:shadow-blue-600/50 transform hover:-translate-y-1 active:scale-95">
                Go Home
            </a>
        </div>

        <!-- Secret Delayed Message -->
        <div id="secret-message" class="mt-12 text-sm md:text-lg font-medium text-slate-500 opacity-0 translate-y-4 pointer-events-none transition-all duration-1000 ease-in-out">
            You're still here? It's over. <a href="/" class="text-blue-400 hover:text-blue-200 underline underline-offset-8 pointer-events-auto">Go home</a>. Go.
        </div>
    </main>

    <script>
        // Logic for Drifting Cursor Glow
        const glow = document.getElementById('cursor-glow');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let glowX = window.innerWidth / 2;
        let glowY = window.innerHeight / 2;

        // Speed of follow (0.01 to 0.1 is usually best for "steady pace")
        const speed = 0.05; 

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            // Linear interpolation (Lerp) for smooth drifting effect
            glowX += (mouseX - glowX) * speed;
            glowY += (mouseY - glowY) * speed;

            // Apply transform to center the 500px glow on the "drifting" coordinates
            glow.style.transform = `translate(${glowX - 250}px, ${glowY - 250}px)`;

            requestAnimationFrame(animate);
        }

        // Start the animation loop
        animate();

        // 6-second secret message logic
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const secretMsg = document.getElementById('secret-message');
                secretMsg.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                secretMsg.classList.add('opacity-100', 'translate-y-0');
            }, 6000);
        });
    </script>
</body>
</html>
