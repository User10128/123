<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relax & Focus</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for modern layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Smooth transitions for high-end landscape feel */
        #bg-container {
            transition: background-image 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Ambient slow breathing animation for the interaction overlay */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.03); }
        }
        .pulse-slow {
            animation: pulse-slow 4s infinite ease-in-out;
        }

        /* Ambient glassmorphism defaults */
        .glass-panel {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Audio visualizer bar animation */
        @keyframes bounce-bar {
            0%, 100% { height: 4px; }
            50% { height: 18px; }
        }
        .v-bar {
            animation: bounce-bar 1.2s infinite ease-in-out;
            animation-play-state: paused; /* Start paused until music plays */
        }
        .v-bar:nth-child(2) { animation-delay: 0.2s; }
        .v-bar:nth-child(3) { animation-delay: 0.4s; }
        .v-bar:nth-child(4) { animation-delay: 0.1s; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden select-none font-sans h-screen w-screen relative">

    <!-- Premium Fullscreen Cinematic Backgrounds -->
    <div id="bg-container" class="absolute inset-0 w-full h-full bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1503899036084-c55cdd92da26?q=80&w=2670&auto=format&fit=crop');">
    </div>

    <!-- Soft ambient dark gradient for subtle depth -->
    <div class="absolute inset-0 bg-gradient-to-tr from-slate-950/50 via-transparent to-slate-950/20 pointer-events-none"></div>

    <!-- Interaction Overlay (Required for browsers to play audio safely) -->
    <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/85 backdrop-blur-xl z-50 cursor-pointer transition-all duration-1000">
        <div class="text-center max-w-md px-6">
            <div class="w-20 h-20 mx-auto mb-6 flex items-center justify-center rounded-full bg-white/10 border border-white/20 hover:scale-105 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white ml-1" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
            <h2 class="font-serif italic text-3xl mb-2 text-white">Enter</h2>
            <p class="text-slate-400 font-light text-sm tracking-wider uppercase pulse-slow">Click anywhere to begin your session</p>
        </div>
    </div>

    <!-- Main Dynamic Interface -->
    <div class="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
        
        <!-- Top Row: Time, Temp & Status Widget -->
        <div class="flex items-start justify-between w-full">
            <div class="glass-panel rounded-2xl px-6 py-4 flex items-center gap-6 pointer-events-auto transition-all duration-500 hover:bg-slate-900/40">
                <!-- Time Block -->
                <div class="flex flex-col">
                    <span id="time" class="text-5xl font-extralight tracking-tight text-white leading-none">--:--</span>
                    <span id="date-label" class="text-[10px] uppercase tracking-widest text-slate-400 mt-1.5 font-medium">-- --</span>
                </div>
                
                <!-- Separator -->
                <div class="h-8 w-px bg-white/10"></div>
                
                <!-- Weather Block -->
                <div class="flex items-center gap-3">
                    <div id="weather-icon-holder" class="text-slate-300">
                        <!-- Dynamic Weather SVG will go here -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                        </svg>
                    </div>
                    <div class="flex flex-col">
                        <span id="temp" class="text-2xl font-light text-slate-100">--°F</span>
                        <span id="weather-desc" class="text-[10px] uppercase tracking-widest text-slate-400 mt-0.5 font-medium">Calm Sky</span>
                    </div>
                </div>
            </div>

            <!-- Gentle branding mark -->
            <div class="text-right hidden md:block">
                <span class="font-serif italic text-lg text-white/80 block">Relax by Checkers Labs</span>
                <span class="text-[9px] uppercase tracking-widest text-white/40 block mt-0.5">Mindful Ambience</span>
            </div>
        </div>

        <!-- Bottom Row: Dynamic Control Center -->
        <div class="flex items-end justify-between w-full">
            <div class="text-left text-slate-400/60 text-xs hidden md:block">
                Right-click anywhere to customize your space
            </div>

            <!-- Premium Music Player Widget -->
            <div class="glass-panel rounded-2xl p-4 flex items-center gap-4 pointer-events-auto w-80 transition-all duration-500 hover:bg-slate-900/40">
                <!-- Visualizer anim/Album Icon -->
                <div class="w-12 h-12 rounded-xl bg-slate-900/60 border border-white/5 flex items-center justify-center relative overflow-hidden">
                    <div class="flex items-end gap-1 h-5 opacity-20" id="visualizer">
                        <div class="w-1 bg-teal-400/80 rounded-full v-bar"></div>
                        <div class="w-1 bg-teal-400/80 rounded-full v-bar"></div>
                        <div class="w-1 bg-teal-400/80 rounded-full v-bar"></div>
                        <div class="w-1 bg-teal-400/80 rounded-full v-bar"></div>

                </div>

                <!-- Track Metadata & Controls -->
                <div class="flex-1 min-w-0">
                    <div class="text-xs font-semibold text-white truncate">Relaxing Piano Pop</div>
                    <div class="text-[10px] text-slate-400 font-serif italic truncate mt-0.5">Curated Ambient Stream</div>
                    
                    <!-- Volume Bar -->
                    <div class="flex items-center gap-2 mt-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />

    <!-- Right-Click Context Menu (Frosted Glass Aesthetics) -->

            Change View (Swap BG)

        <button id="btn-reload" class="w-full text-left px-5 py-3 hover:bg-white/10 transition duration-200 flex items-center gap-3">

            Refresh Scene

        <div class="h-px bg-white/10 my-2"></div>

            Open Checkers.page
        </a>
        <a href="https://slate.checkers.page" target="_blank" class="block w-full text-left px-5 py-3 hover:bg-white/10 transition duration-200 flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
            Open Slate Board
        </a>
    </div>

    <!-- YouTube Dynamic Player Container -->
    <div id="player-container" class="absolute pointer-events-none opacity-0 w-1 h-1">
        <div id="player"></div>
    </div>

    <script>
        // --- 1. Immersive Curated Artworks ---
        const backgrounds = [
            'https://t4.ftcdn.net/jpg/09/32/57/23/240_F_932572345_s2ZS8nDQg1MuukYPqXC6dLuHsRAPGZWZ.jpg', // Tokyo Cyber Ambient

                        'https://t4.ftcdn.net/jpg/03/14/14/11/240_F_314141146_OLdlWE1SkeUyquNjSa45S6pxAmss6VbK.jpg', // Misty Mountain Woods
            'https://t3.ftcdn.net/jpg/00/82/68/82/240_F_82688299_0d9RUQP4WZ3FHRrZyfYjqfwdDxeljoSa.jpg', // Kyoto Sunset Alley
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6xmDy6fatVDs6hzuPHWn_NN8rL8vMqRWsMQ&s', // Starry Alpine Wilderness
                        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bGFuZHNjYXBlc3xlbnwwfHwwfHx8MA%3D%3D', // Misty Mountain Woods
            'https://photographylife.com/wp-content/uploads/2017/01/What-is-landscape-photography.jpg', // Kyoto Sunset Alley
            'https://photographylife.com/wp-content/uploads/2016/06/Mass.jpg', // Starry Alpine Wilderness
                        'https://images.ctfassets.net/h6goo9gw1hh6/6q7wxEsZobVBc3qxUrjJWq/b038b963c63e31fe633e434b817ee14e/sunrise.jpg?w=1200&h=800&fl=progressive&q=70&fm=jpg', // Misty Mountain Woods
            'https://img.freepik.com/free-vector/nature-scene-with-river-hills-forest-mountain-landscape-flat-cartoon-style-illustration_1150-37326.jpg?semt=ais_hybrid&w=740&q=80', // Kyoto Sunset Alley
            'https://t4.ftcdn.net/jpg/00/91/73/65/360_F_91736536_zh7DskHlGbv8VMR8zahF3kWU9uZsDZz2.jpg', // Starry Alpine Wilderness
                        'https://iso.500px.com/wp-content/uploads/2014/07/hong-kong-cityscape1.jpg', // Misty Mountain Woods
            'https://www.adobe.com/creativecloud/photography/type/media_18ec078ac12361c5bd437dae615fd5dd92bfbfe51.jpg?width=1200&format=pjpg&optimize=medium', // Kyoto Sunset Alley
            'https://images.pexels.com/photos/30136066/pexels-photo-30136066.jpeg?cs=srgb&dl=pexels-apyfz-30136066.jpg&fm=jpg', // Starry Alpine Wilderness
                        'https://www.shutterstock.com/image-photo/wet-asphalt-road-city-skyline-600nw-2706811681.jpg', // Misty Mountain Woods
            'https://static.vecteezy.com/system/resources/thumbnails/075/500/912/small/cityscape-reflections-at-night-a-symphony-of-light-and-shadow-on-still-waters-photo.jpg', // Kyoto Sunset Alley
            'https://deih43ym53wif.cloudfront.net/dubai-uae-shutterstock_728342668_81490299a5.jpeg', // Starry Alpine Wilderness
                        'https://img.magnific.com/free-photo/view-new-york-city-night-time_53876-138055.jpg?semt=ais_hybrid&w=740&q=80', // Misty Mountain Woods
            'https://content.paulreiffer.com/wp-content/uploads/2014/12/Arise-Financial-District-Freedom-Tower-One-World-Trade-Center-FiDi-New-York-City-River-Paul-Reiffer-Cityscape-Landscape-Photography@2x.jpg', // Kyoto Sunset Alley
            'https://iso.500px.com/wp-content/uploads/2014/07/hong-kong-the-peak-view.jpg', // Starry Alpine Wilderness
                        'https://img.magnific.com/free-photo/skyline-downtown-new-york-new-york-usa_268835-773.jpg?semt=ais_hybrid&w=740&q=80', // Misty Mountain Woods
            'https://t3.ftcdn.net/jpg/00/67/33/88/360_F_67338876_RJHPtMW0G2dGB8tASgvFMDatHQNwusZC.jpg', // Kyoto Sunset Alley
            'https://i0.wp.com/digital-photography-school.com/wp-content/uploads/2022/12/cityscape-photos-examples-18.jpg?resize=1500%2C1001&ssl=1', // Starry Alpine Wilderness
                        'https://t4.ftcdn.net/jpg/05/22/93/63/360_F_522936327_P22aM6GXgGv31aiSyzToTbtClbxlRrZC.jpg', // Misty Mountain Woods
            'https://media.istockphoto.com/id/1136437406/photo/san-francisco-skyline-with-oakland-bay-bridge-at-sunset-california-usa.jpg?s=612x612&w=0&k=20&c=JVBBZT2uquZbfY0njYHv8vkLfatoM4COJc-lX5QKYpE=', // Kyoto Sunset Alley
            'https://media.istockphoto.com/id/2191907519/photo/skyscraper-in-city-city-downtown-with-skyscraper-office-building-business-district-modern.webp?b=1&s=612x612&w=0&k=20&c=FktYP6tix-62u8lNO1biLzwQy-Rju3tz_x4x8rQcVx8=', // Starry Alpine Wilderness
                        'https://media.istockphoto.com/id/1739024655/photo/asphalt-road-and-city-skyline-at-sunset.jpg?s=612x612&w=0&k=20&c=PxXf1utnXOJzXm5kYrfI751aw-wiIAIy6tC7mROk8IM=', // Misty Mountain Woods
            'https://t3.ftcdn.net/jpg/02/99/49/00/360_F_299490075_5Xw5tJJGkBBiVixmA3n8KemFRJmS6J81.jpg', // Kyoto Sunset Alley
            'https://t4.ftcdn.net/jpg/04/10/17/81/360_F_410178103_csRCkM4ZA1Zz07lSID07URpl21S1zegS.jpg', // Starry Alpine Wilderness
            'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2673&auto=format&fit=crop'  // Pure Ocean Dream
        ];
        let currentBgIndex = 0;

        function swapBackground() {
            currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
            document.getElementById('bg-container').style.backgroundImage = `url('${backgrounds[currentBgIndex]}')`;
        }

        // --- 2. Clock & Date Logic ---
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            document.getElementById('time').innerText = `${hours}:${minutes} ${ampm}`;
            
            // Set dynamic aesthetic date
            const day = now.getDate();
            const month = monthNames[now.getMonth()];
            document.getElementById('date-label').innerText = `${month} ${day}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Weather Integration with Visuals ---
        function setWeatherVisuals(tempF, weatherCode) {
            document.getElementById('temp').innerText = `${Math.round(tempF)}°F`;
            
            let iconSvg = '';
            let desc = 'Clear';
            
            if (weatherCode <= 3) {
                // Clear or Mainly Clear
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z" /></svg>`;
                desc = 'Clear Sky';
            } else if (weatherCode <= 48) {
                // Clouds or Fog
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>`;
                desc = 'Overcast';
            } else if (weatherCode <= 67) {
                // Rain or Drizzle
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>`;
                desc = 'Rainy Chill';
            } else {
                // Storm or Snow
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`;
                desc = 'Dynamic Atmosphere';
            }
            
            document.getElementById('weather-icon-holder').innerHTML = iconSvg;
            document.getElementById('weather-desc').innerText = desc;
        }

        function fetchWeather() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    try {
                        const { latitude, longitude } = position.coords;
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=fahrenheit`);
                        const data = await response.json();
                        if (data && data.current_weather) {
                            setWeatherVisuals(data.current_weather.temperature, data.current_weather.weathercode);
                        }
                    } catch (error) {
                        console.error("Weather error:", error);
                        document.getElementById('temp').innerText = `--°F`;
                    }
                }, () => {
                    document.getElementById('temp').innerText = `No Location`;
                    document.getElementById('weather-desc').innerText = `Using Default`;
                });
            } else {
                document.getElementById('temp').innerText = `--°F`;
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 30 * 60 * 1000); 

        // --- 4. Custom Context Menu ---
        const menu = document.getElementById('context-menu');
        
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;
            const menuWidth = 240; 
            const menuHeight = menu.offsetHeight || 220;
            
            let x = e.clientX;
            let y = e.clientY;
            
            if (x + menuWidth > winWidth) x = winWidth - menuWidth - 8;
            if (y + menuHeight > winHeight) y = winHeight - menuHeight - 8;
            
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
            menu.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (e.target.offsetParent !== menu) {
                menu.classList.add('hidden');
            }
        });

        document.getElementById('btn-swap').addEventListener('click', swapBackground);
        document.getElementById('btn-reload').addEventListener('click', () => location.reload());

        // --- 5. Robust YouTube Player Creation ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        let isMusicPlaying = false;
        let apiReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'Kr_b-9rn_Ag',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'Kr_b-9rn_Ag',
                    'playsinline': 1,
                    'rel': 0,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            apiReady = true;
            player.setVolume(40);
        }

        // UI & Overlay Handlers
        const overlay = document.getElementById('start-overlay');
        const visualizer = document.getElementById('visualizer');
        const playPauseBtn = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const volumeSlider = document.getElementById('volume-slider');

        overlay.addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => {
                this.classList.add('hidden');
            }, 1000);

            // Play music immediately upon interaction
            playMusic();
        });

        function playMusic() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
                isMusicPlaying = true;
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                visualizer.classList.remove('opacity-20');
                
                const bars = document.querySelectorAll('.v-bar');
                bars.forEach(b => b.style.animationPlayState = 'running');
            } else {
                // If api not ready yet, retry in 300ms
                setTimeout(playMusic, 300);
            }
        }

        function pauseMusic() {
            if (player && typeof player.pauseVideo === 'function') {
                player.pauseVideo();
                isMusicPlaying = false;
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                visualizer.classList.add('opacity-20');
                
                const bars = document.querySelectorAll('.v-bar');
                bars.forEach(b => b.style.animationPlayState = 'paused');
            }
        }

        // Toggle button logic
        playPauseBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        });

        // Volume logic
        volumeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            if (player && typeof player.setVolume === 'function') {
                player.setVolume(val);
            }
        });
    </script>
</body>
</html>
