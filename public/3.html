<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Shape Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222; /* Default background before generation */
            cursor: none; /* Hide default cursor to use custom inverted one */
            font-family: sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* The custom cursor that inverts colors underneath it */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 36px;
            height: 36px;
            background-color: white; /* White with difference blend mode creates a perfect color inversion */
            border-radius: 50%;
            pointer-events: none; /* Let clicks pass through to canvas */
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.1s ease, height 0.1s ease;
        }

        /* Inner dot for precision */
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Expand cursor on click */
        body.active #custom-cursor {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');

        let PALETTE = {};
        let width, height;
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let startTime = Date.now();

        // Helper function to generate 3 random analogous colors
        function generateAnalogousPalette() {
            // Pick a random base hue
            const baseHue = Math.floor(Math.random() * 360);
            
            // Analogous colors are adjacent on the color wheel (typically within 30-45 degrees)
            const hueShift = 30 + Math.floor(Math.random() * 10); 
            const h1 = (baseHue - hueShift + 360) % 360;
            const h2 = baseHue;
            const h3 = (baseHue + hueShift) % 360;
            
            // Keep colors vibrant and beautifully bright
            const s = 85 + Math.floor(Math.random() * 10); // 85% - 95%
            const l = 50 + Math.floor(Math.random() * 8);   // 50% - 58%
            
            return {
                color1: `hsl(${h1}, ${s}%, ${l}%)`,
                color2: `hsl(${h2}, ${s}%, ${l}%)`,
                color3: `hsl(${h3}, ${s}%, ${l}%)`
            };
        }

        // Handle resizing and grid regeneration
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            startTime = Date.now(); // Reset start time on resize to trigger a new intro effect

            // Generate a fresh set of analogous colors
            PALETTE = generateAnalogousPalette();

            const spacing = 45; // Space between shapes

            for (let x = spacing / 2; x < width; x += spacing) {
                for (let y = spacing / 2; y < height; y += spacing) {
                    particles.push(new Particle(x, y));
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                
                // Spawn at a random spot to fly in gracefully
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // Starting velocity burst
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                
                // Determine which vertical third this particle belongs to and color it contrastingly
                let sectionHeight = height / 3;
                let sectionIndex = Math.floor(y / sectionHeight);
                if (sectionIndex > 2) sectionIndex = 2;

                let availableColors = [PALETTE.color1, PALETTE.color2, PALETTE.color3];
                // Remove its native background stripe's color to make the particle stand out
                availableColors.splice(sectionIndex, 1);
                
                // Assign one of the remaining two analogous colors
                this.color = availableColors[Math.floor(Math.random() * availableColors.length)];
                
                this.baseRadius = 6 + Math.random() * 4;
                this.radius = this.baseRadius * 0.1; // Start tiny and scale up
                this.targetRadius = this.baseRadius;
                
                this.cornerRatio = 1;
                this.targetCornerRatio = 1;
                this.angle = Math.random() * Math.PI * 2;
                this.timeOffset = Math.random() * Math.PI * 2;
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                // Subtle continuous organic wave motion (even when idle)
                const waveSpeed = Date.now() * 0.0015;
                const waveScale = 0.008;
                let idleOffsetX = Math.sin(this.baseY * waveScale + waveSpeed + this.timeOffset) * 6;
                let idleOffsetY = Math.cos(this.baseX * waveScale + waveSpeed + this.timeOffset) * 6;

                // Combine baseline grid spot with idle wave animation
                let targetX = this.baseX + idleOffsetX;
                let targetY = this.baseY + idleOffsetY;

                // Handle interactive cursor physics
                if (dist < 150) {
                    let force = (150 - dist) / 150;
                    this.vx -= (dx / dist) * force * 1.8;
                    this.vy -= (dy / dist) * force * 1.8;
                    
                    this.targetRadius = this.baseRadius * 2.5;
                    this.targetCornerRatio = 0.35; // Morph to rounded square
                } else {
                    this.targetRadius = this.baseRadius;
                    this.targetCornerRatio = 1; // Return to circle
                }

                // Intro expanding shockwave effect (pulses from center of screen on load)
                const elapsed = Date.now() - startTime;
                if (elapsed < 2500) {
                    const centerX = width / 2;
                    const centerY = height / 2;
                    let distToCenter = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);
                    
                    // The wave front moves outwards over time
                    const waveRadius = (elapsed / 2500) * (Math.max(width, height) * 1.2);
                    const waveThickness = 120;

                    if (Math.abs(distToCenter - waveRadius) < waveThickness) {
                        const waveForce = (1 - Math.abs(distToCenter - waveRadius) / waveThickness);
                        const angleToCenter = Math.atan2(this.y - centerY, this.x - centerX);
                        
                        // Push away from center
                        this.vx += Math.cos(angleToCenter) * waveForce * 4;
                        this.vy += Math.sin(angleToCenter) * waveForce * 4;
                        
                        // Morph while the intro wave hits them
                        this.targetCornerRatio = 0.35;
                        this.targetRadius = this.baseRadius * 2.0;
                    }
                }

                // Return to target position (spring effect)
                let bx = targetX - this.x;
                let by = targetY - this.y;
                
                this.vx += bx * 0.04; // Spring force
                this.vy += by * 0.04;
                
                this.vx *= 0.82; // Friction/damping
                this.vy *= 0.82;

                this.x += this.vx;
                this.y += this.vy;

                // Smoothly transition size and shape corner-ratio
                this.radius += (this.targetRadius - this.radius) * 0.15;
                this.cornerRatio += (this.targetCornerRatio - this.cornerRatio) * 0.15;
                
                // Dynamic rotation based on movement velocity
                this.angle += (Math.abs(this.vx) + Math.abs(this.vy)) * 0.03 + 0.005;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Morph smoothly between a circle (ratio 1) and a rounded square (ratio 0.35) using roundRect
                ctx.roundRect(-this.radius, -this.radius, this.radius * 2, this.radius * 2, this.radius * this.cornerRatio);

                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // Animation Loop
        function animate() {
            // Draw the three background stripes
            ctx.fillStyle = PALETTE.color1;
            ctx.fillRect(0, 0, width, height / 3);
            
            ctx.fillStyle = PALETTE.color2;
            ctx.fillRect(0, height / 3, width, height / 3);
            
            ctx.fillStyle = PALETTE.color3;
            ctx.fillRect(0, (height / 3) * 2, width, height / 3);

            // Update and draw all particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', init);

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Move the custom cursor
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Touch support for mobile devices
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            cursor.style.left = mouse.x + 'px';
            cursor.style.top = mouse.y + 'px';
        });

        // Click blast effect
        window.addEventListener('mousedown', () => {
            document.body.classList.add('active');
            particles.forEach(p => {
                let dx = p.x - mouse.x;
                let dy = p.y - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    p.vx += (dx / dist) * 25;
                    p.vy += (dy / dist) * 25;
                }
            });
        });

        window.addEventListener('mouseup', () => {
            document.body.classList.remove('active');
        });

        window.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // Start
        init();
        animate();
    </script>
</body>
</html>
