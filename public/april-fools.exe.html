        let sequence = [];
        let currentLineIndex = 0;
        let currentCharIndex = 0;
        let currentTextSpan = null;
        let cursor = null;
        let isDone = false;
        
        // How many characters appear per keystroke (makes it feel satisfying and fast!)
        const charsPerKeystroke = 3; 

        function initHackerTyper() {
            // Shuffle the pool to get a unique experience every time
            const shuffledPool = jokePool.sort(() => 0.5 - Math.random());
            
            // Pick exactly 15 random lines from our giant list
            sequence = shuffledPool.slice(0, 15);
            
            // Add a starting instruction so they know to type
            sequence.unshift({
                text: "> SYSTEM LOCKED. MASH KEYBOARD TO OVERRIDE MAINFRAME <",
                class: "highlight"
            });

            // Add the mandatory ending lines
            sequence.push({
                text: "Just kidding. Happy April Fools! :)",
                class: "highlight"
            });
            sequence.push({
                text: "Redirecting you back to safety...",
                class: ""
            });

            setupNextLine();
            
            // Listen for any key press on the entire page
            document.addEventListener('keydown', handleKeyPress);
        }

        function setupNextLine() {
            if (currentLineIndex >= sequence.length) {
                isDone = true;
                // Wait 1 second so they can read the last line, then redirect
                setTimeout(returnToMainSite, 1000); 
                return;
            }

            const lineData = sequence[currentLineIndex];
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            if (lineData.class) lineDiv.classList.add(lineData.class);
            
            currentTextSpan = document.createElement('span');
            cursor = document.createElement('span');
            cursor.className = 'cursor';
            
            lineDiv.appendChild(currentTextSpan);
            lineDiv.appendChild(cursor);
            terminal.appendChild(lineDiv);
            
            currentCharIndex = 0;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function handleKeyPress(e) {
            // Ignore things like Shift, Ctrl, Alt so it doesn't trigger on them alone
            const ignoreKeys = ['Shift', 'Control', 'Alt', 'Meta', 'CapsLock', 'Tab', 'Escape'];
            if (ignoreKeys.includes(e.key) || e.ctrlKey || e.altKey || e.metaKey) {
                return;
            }
            
            if (isDone) return;
            
            // Prevent default actions like Spacebar scrolling the page
            e.preventDefault();

            const lineData = sequence[currentLineIndex];
            
            // Type a chunk of characters for every key press
            for (let i = 0; i < charsPerKeystroke; i++) {
                if (currentCharIndex < lineData.text.length) {
                    currentTextSpan.textContent += lineData.text.charAt(currentCharIndex);
                    currentCharIndex++;
                }
            }
            
            terminal.scrollTop = terminal.scrollHeight;

            // If the line is finished, move to the next one
            if (currentCharIndex >= lineData.text.length) {
                cursor.remove(); // Remove the cursor block from the finished line
                currentLineIndex++;
                setupNextLine();
            }
        }

        function returnToMainSite() {
            // Using history.back() tries to go to the previous page.
            // If they landed here directly, fallback to the root domain.
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/'; 
            }
        }

        // Start the fake hack when the page loads
        window.onload = initHackerTyper;
