<!DOCTYPE html>
<html>
<head>
    <title>You are Offline</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .icon { font-size: 50px; }
    </style>
</head>
<body>
    <div class="icon">📡❌</div>
    <h1>You're offline right now</h1>
    <p>Check your connection and try again. Don't worry, we've saved your progress.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
    <script>
    // Automatically send them back to the home page when internet returns
    window.addEventListener('online', () => {
        window.location.href = './index.html';
    });
</script>
</body>
</html>
